<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세계 시간 여행</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ── 1080×1920 고정 캔버스 ── */
    .stage {
      width: 1080px;
      height: 1920px;
      transform-origin: top left;
      background: linear-gradient(160deg, #e0f7fa 0%, #fce4ec 55%, #f3e5f5 100%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 0; left: 0;
    }

    /* ── 별 장식 ── */
    .stars {
      text-align: center;
      font-size: 36px;
      letter-spacing: 18px;
      padding: 28px 0 12px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* ── 헤더 ── */
    header {
      text-align: center;
      flex-shrink: 0;
      padding: 10px 0 30px;
    }

    .header-emoji {
      font-size: 96px;
      display: block;
      line-height: 1;
      animation: spin 10s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    header h1 {
      font-size: 72px;
      font-weight: 900;
      color: #5c35b0;
      margin-top: 16px;
      text-shadow: 4px 4px 0 #d1c4e9;
      line-height: 1.1;
    }

    header p {
      font-size: 34px;
      color: #7e57c2;
      margin-top: 12px;
      font-weight: 700;
    }

    /* ── 도시 추가 바 ── */
    .add-bar {
      display: flex;
      gap: 20px;
      margin: 0 60px 40px;
      background: #fff;
      border-radius: 100px;
      padding: 16px 16px 16px 48px;
      box-shadow: 0 8px 40px rgba(92,53,176,0.18);
      align-items: center;
      flex-shrink: 0;
    }

    .add-bar select {
      flex: 1;
      border: none;
      outline: none;
      font-size: 36px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      color: #5c35b0;
      background: transparent;
      cursor: pointer;
    }

    .add-bar select option { color: #333; font-size: 20px; }

    .add-bar button {
      padding: 22px 56px;
      background: linear-gradient(135deg, #7c4dff, #e040fb);
      border: none;
      border-radius: 100px;
      color: #fff;
      font-size: 34px;
      font-weight: 900;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(124,77,255,0.45);
      transition: transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-bar button:hover  { transform: translateY(-3px); }
    .add-bar button:active { transform: translateY(0); }

    /* ── 카드 그리드 ── */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 32px;
      padding: 0 60px 60px;
      overflow: hidden;
    }

    /* ── 카드 ── */
    .card {
      border-radius: 40px;
      padding: 44px 44px 36px;
      position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      align-items: center;
      text-align: center;
      overflow: hidden;
      min-height: 0;
    }

    .card:hover { transform: translateY(-6px); }

    .card-0 { background: linear-gradient(135deg, #fff9c4, #fff176); }
    .card-1 { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); }
    .card-2 { background: linear-gradient(135deg, #bbdefb, #90caf9); }
    .card-3 { background: linear-gradient(135deg, #f8bbd0, #f48fb1); }
    .card-4 { background: linear-gradient(135deg, #ffe0b2, #ffcc80); }
    .card-5 { background: linear-gradient(135deg, #e1bee7, #ce93d8); }
    .card-6 { background: linear-gradient(135deg, #b2ebf2, #80deea); }
    .card-7 { background: linear-gradient(135deg, #dcedc8, #c5e1a5); }

    .card.home-card {
      background: linear-gradient(135deg, #ede7f6, #d1c4e9) !important;
      border: 5px solid #7c4dff;
      box-shadow: 0 10px 40px rgba(124,77,255,0.3);
    }

    .card .remove-btn {
      position: absolute;
      top: 24px;
      right: 28px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0,0,0,0.1);
      border: none;
      color: rgba(0,0,0,0.4);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .card .remove-btn:hover { background: #ef5350; color: #fff; }

    .card .top-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    .card .flag {
      font-size: 80px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 156px;
      height: 156px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
      backdrop-filter: blur(4px);
    }

    .card .city-info { display: flex; flex-direction: column; align-items: flex-start; }

    .card .city {
      font-size: 56px;
      font-weight: 900;
      color: #212121;
      line-height: 1.1;
    }

    .card .time {
      font-size: 80px;
      font-weight: 900;
      color: #212121;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      line-height: 1;
      margin-top: 8px;
    }

    .card .date {
      font-size: 26px;
      color: #555;
      font-weight: 700;
      margin-top: 8px;
    }

    .weather-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-size: 28px;
      font-weight: 700;
      color: #333;
    }
    .weather-emoji { font-size: 34px; line-height: 1; }
    .weather-temp  { font-weight: 900; color: #212121; }
    .weather-desc  { color: #666; }

    .diff-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 26px;
      font-weight: 900;
      background: rgba(0,0,0,0.1);
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
    }

    .diff-ahead  { color: #1b5e20; }
    .diff-behind { color: #b71c1c; }
    .diff-same   { color: #4a148c; }

    /* ── 그리드 레이아웃 (카드 수별) ── */
    .grid.count-1 { grid-template-columns: 1fr;     grid-template-rows: 1fr; }
    .grid.count-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .grid.count-3 { grid-template-rows: 1fr 1fr; }
    .grid.count-3 .card:first-child { grid-column: 1 / 3; }
    .grid.count-4 { grid-template-rows: 1fr 1fr; }
    .grid.count-5 { grid-template-rows: 1fr 1fr 1fr; }
    .grid.count-5 .card:first-child { grid-column: 1 / 3; }
    .grid.count-6 { grid-template-rows: 1fr 1fr 1fr; }

    /* ── 1개: 초대형 ── */
    .grid.count-1 .card .flag        { font-size: 140px; width: 260px; height: 260px; }
    .grid.count-1 .card .city        { font-size: 110px; }
    .grid.count-1 .card .time        { font-size: 200px; letter-spacing: -4px; }
    .grid.count-1 .card .date        { font-size: 48px; margin-top: 12px; }
    .grid.count-1 .card .diff-badge  { font-size: 44px; padding: 16px 36px; margin-top: 20px; }
    .grid.count-1 .card .home-label  { font-size: 36px; padding: 10px 28px; }

    /* ── 2개: 대형 ── */
    .grid.count-2 .card .flag        { font-size: 110px; width: 210px; height: 210px; }
    .grid.count-2 .card .city        { font-size: 88px; }
    .grid.count-2 .card .time        { font-size: 148px; letter-spacing: -3px; }
    .grid.count-2 .card .date        { font-size: 38px; margin-top: 10px; }
    .grid.count-2 .card .diff-badge  { font-size: 34px; padding: 12px 28px; margin-top: 16px; }
    .grid.count-2 .card .home-label  { font-size: 28px; padding: 8px 22px; }

    /* ── 3개: 전폭(첫 카드) 대형 / 반폭(나머지) 중형 ── */
    .grid.count-3 .card:first-child .flag       { font-size: 96px; width: 180px; height: 180px; }
    .grid.count-3 .card:first-child .city       { font-size: 76px; }
    .grid.count-3 .card:first-child .time       { font-size: 120px; letter-spacing: -2px; }
    .grid.count-3 .card:first-child .date       { font-size: 34px; margin-top: 8px; }
    .grid.count-3 .card:first-child .diff-badge { font-size: 30px; padding: 10px 24px; margin-top: 14px; }
    .grid.count-3 .card:first-child .home-label { font-size: 24px; padding: 6px 18px; }
    .grid.count-3 .card:not(:first-child) .flag       { font-size: 64px; width: 130px; height: 130px; }
    .grid.count-3 .card:not(:first-child) .city       { font-size: 56px; }
    .grid.count-3 .card:not(:first-child) .time       { font-size: 84px; letter-spacing: -1px; }
    .grid.count-3 .card:not(:first-child) .date       { font-size: 24px; margin-top: 6px; }
    .grid.count-3 .card:not(:first-child) .diff-badge { font-size: 22px; padding: 8px 16px; margin-top: 10px; }
    .grid.count-3 .card:not(:first-child) .home-label { font-size: 20px; padding: 5px 14px; }

    /* ── 4개: 중형 ── */
    .grid.count-4 .card .flag        { font-size: 84px; width: 156px; height: 156px; }
    .grid.count-4 .card .city        { font-size: 64px; }
    .grid.count-4 .card .time        { font-size: 100px; }
    .grid.count-4 .card .date        { font-size: 30px; margin-top: 6px; }
    .grid.count-4 .card .diff-badge  { font-size: 28px; padding: 10px 22px; margin-top: 12px; }
    .grid.count-4 .card .home-label  { font-size: 22px; padding: 6px 16px; }

    /* ── 5~6개: 소형 ── */
    .grid.count-5 .card,
    .grid.count-6 .card              { padding: 28px 28px 22px; border-radius: 32px; }
    .grid.count-5 .card .flag,
    .grid.count-6 .card .flag        { font-size: 54px; width: 108px; height: 108px; }
    .grid.count-5 .card .city,
    .grid.count-6 .card .city        { font-size: 44px; }
    .grid.count-5 .card .time,
    .grid.count-6 .card .time        { font-size: 66px; margin-top: 4px; }
    .grid.count-5 .card .date,
    .grid.count-6 .card .date        { font-size: 22px; margin-top: 4px; }
    .grid.count-5 .card .diff-badge,
    .grid.count-6 .card .diff-badge  { font-size: 20px; padding: 7px 16px; margin-top: 8px; }
    .grid.count-5 .card .home-label,
    .grid.count-6 .card .home-label  { font-size: 18px; padding: 4px 14px; }
    .grid.count-5 .card .remove-btn,
    .grid.count-6 .card .remove-btn  { width: 40px; height: 40px; top: 14px; right: 16px; font-size: 16px; }

    /* ── 커스텀 팝업 ── */
    .popup-overlay {
      position: absolute;
      inset: 0;
      background: rgba(92, 53, 176, 0.45);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .popup-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .popup-box {
      background: #fff;
      border-radius: 48px;
      padding: 72px 80px 64px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(92,53,176,0.3);
      transform: scale(0.85);
      transition: transform 0.2s;
      max-width: 820px;
      width: 90%;
    }
    .popup-overlay.show .popup-box { transform: scale(1); }
    .popup-emoji  { font-size: 100px; line-height: 1; display: block; margin-bottom: 28px; }
    .popup-msg    { font-size: 44px; font-weight: 900; color: #5c35b0; line-height: 1.4; margin-bottom: 52px; }
    .popup-btn {
      padding: 24px 80px;
      background: linear-gradient(135deg, #7c4dff, #e040fb);
      border: none;
      border-radius: 100px;
      color: #fff;
      font-size: 38px;
      font-weight: 900;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(124,77,255,0.4);
      transition: transform 0.1s;
    }
    .popup-btn:hover  { transform: translateY(-3px); }
    .popup-btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="stars">⭐ 🌙 ✨ 🌟 ✨ 🌙 ⭐</div>

    <header>
      <span class="header-emoji">🌍</span>
      <h1>세계 시간 여행</h1>
      <p>지구촌 친구들은 지금 몇 시일까요? 🕐</p>
    </header>

    <div class="add-bar">
      <select id="citySelect"></select>
      <button onclick="addCity()">+ 도시 추가</button>
    </div>

    <div class="grid" id="grid"></div>

    <!-- 커스텀 팝업 -->
    <div class="popup-overlay" id="popup" onclick="closePopup()">
      <div class="popup-box" onclick="event.stopPropagation()">
        <span class="popup-emoji" id="popupEmoji"></span>
        <div class="popup-msg" id="popupMsg"></div>
        <button class="popup-btn" onclick="closePopup()">확인 ✔</button>
      </div>
    </div>
  </div>

  <script>
    /* ── 1080×1920 스케일 맞추기 ── */
    function scaleStage() {
      const stage = document.getElementById('stage');
      const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
      const left  = (window.innerWidth  - 1080 * scale) / 2;
      const top   = (window.innerHeight - 1920 * scale) / 2;
      stage.style.transform = `scale(${scale})`;
      stage.style.left = left + 'px';
      stage.style.top  = top  + 'px';
    }
    scaleStage();
    window.addEventListener('resize', scaleStage);

    /* ── 도시 데이터 ── */
    const CITIES = [
      { name: "서울",         tz: "Asia/Seoul",          icon: "🏙️", lat:  37.57, lon: 126.98 },
      { name: "도쿄",         tz: "Asia/Tokyo",          icon: "⛩️", lat:  35.68, lon: 139.65 },
      { name: "베이징",       tz: "Asia/Shanghai",       icon: "🐉", lat:  39.90, lon: 116.41 },
      { name: "홍콩",         tz: "Asia/Hong_Kong",      icon: "🌃", lat:  22.32, lon: 114.17 },
      { name: "싱가포르",     tz: "Asia/Singapore",      icon: "🦁", lat:   1.35, lon: 103.82 },
      { name: "방콕",         tz: "Asia/Bangkok",        icon: "🛕", lat:  13.76, lon: 100.50 },
      { name: "뭄바이",       tz: "Asia/Kolkata",        icon: "🕌", lat:  19.08, lon:  72.88 },
      { name: "두바이",       tz: "Asia/Dubai",          icon: "🏜️", lat:  25.20, lon:  55.27 },
      { name: "모스크바",     tz: "Europe/Moscow",       icon: "❄️", lat:  55.76, lon:  37.62 },
      { name: "이스탄불",     tz: "Europe/Istanbul",     icon: "🕍", lat:  41.01, lon:  28.98 },
      { name: "파리",         tz: "Europe/Paris",        icon: "🗼", lat:  48.86, lon:   2.35 },
      { name: "베를린",       tz: "Europe/Berlin",       icon: "🐻", lat:  52.52, lon:  13.41 },
      { name: "런던",         tz: "Europe/London",       icon: "🎡", lat:  51.51, lon:  -0.13 },
      { name: "상파울루",     tz: "America/Sao_Paulo",   icon: "🌴", lat: -23.55, lon: -46.63 },
      { name: "뉴욕",         tz: "America/New_York",    icon: "🗽", lat:  40.71, lon: -74.01 },
      { name: "시카고",       tz: "America/Chicago",     icon: "🌬️", lat:  41.88, lon: -87.63 },
      { name: "덴버",         tz: "America/Denver",      icon: "⛰️", lat:  39.74, lon:-104.99 },
      { name: "로스앤젤레스", tz: "America/Los_Angeles", icon: "🎬", lat:  34.05, lon:-118.24 },
      { name: "밴쿠버",       tz: "America/Vancouver",   icon: "🍁", lat:  49.28, lon:-123.12 },
      { name: "호놀룰루",     tz: "Pacific/Honolulu",    icon: "🌺", lat:  21.31, lon:-157.86 },
      { name: "시드니",       tz: "Australia/Sydney",    icon: "🦘", lat: -33.87, lon: 151.21 },
      { name: "오클랜드",     tz: "Pacific/Auckland",    icon: "🥝", lat: -36.85, lon: 174.76 },
      { name: "카이로",       tz: "Africa/Cairo",        icon: "🐫", lat:  30.04, lon:  31.24 },
      { name: "나이로비",     tz: "Africa/Nairobi",      icon: "🦒", lat:  -1.29, lon:  36.82 },
    ];

    const COLORS = 8;
    const HOME_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const STORAGE_KEY = "wc_cities_v2";

    function loadActive() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          const valid = parsed.filter(n => CITIES.find(c => c.name === n));
          if (valid.length > 0) return valid;
        }
      } catch(e) {}
      return ["서울", "뉴욕", "런던"];
    }

    function saveActive() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(active)); } catch(e) {}
    }

    let active = loadActive();

    function getCity(name) { return CITIES.find(c => c.name === name); }

    function offsetMinutes(tz) {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat("en-US", {
        timeZone: tz, hour: "numeric", minute: "numeric", hour12: false,
        year: "numeric", month: "numeric", day: "numeric"
      });
      const p = {};
      fmt.formatToParts(now).forEach(({ type, value }) => { p[type] = parseInt(value, 10); });
      const d = new Date(p.year, p.month - 1, p.day, p.hour === 24 ? 0 : p.hour, p.minute);
      return Math.round((d - now) / 60000) + now.getTimezoneOffset();
    }

    function diffLabel(tz) {
      const diff = offsetMinutes(tz) - offsetMinutes(HOME_TZ);
      if (diff === 0) return { text: "🏠 내가 사는 곳이에요!", cls: "diff-same" };
      const h = Math.floor(Math.abs(diff) / 60);
      const m = Math.abs(diff) % 60;
      const str = m ? `${h}시간 ${m}분` : `${h}시간`;
      return diff > 0
        ? { text: `⏩ 우리보다 ${str} 빨라요`, cls: "diff-ahead" }
        : { text: `⏪ 우리보다 ${str} 느려요`, cls: "diff-behind" };
    }

    function formatTime(tz) {
      return new Intl.DateTimeFormat("ko-KR", {
        timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false
      }).format(new Date());
    }

    function formatDate(tz) {
      return new Intl.DateTimeFormat("ko-KR", {
        timeZone: tz, month: "long", day: "numeric", weekday: "long"
      }).format(new Date());
    }

    function isHome(tz) {
      return tz === HOME_TZ || offsetMinutes(tz) === offsetMinutes(HOME_TZ);
    }

    function render() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      grid.className = `grid count-${Math.min(active.length, 6)}`;

      active.forEach((name, idx) => {
        const city = getCity(name);
        if (!city) return;
        const home = isHome(city.tz);
        const diff = diffLabel(city.tz);
        const colorClass = home ? "" : `card-${idx % COLORS}`;

        const card = document.createElement("div");
        card.className = "card " + (home ? "home-card" : colorClass);
        card.innerHTML = `
          <button class="remove-btn" onclick="removeCity('${name}')" title="삭제">✕</button>
          <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
            <div class="city">${city.name}</div>
            <div class="time" data-time="${city.tz}"></div>
            <div class="date" data-date="${city.tz}"></div>
            <div class="weather-row" data-weather="${city.name}">🌍 날씨 불러오는 중...</div>
          </div>
          <span class="diff-badge ${diff.cls}">${diff.text}</span>
        `;
        grid.appendChild(card);
      });

      tick();
      applyWeather();
      updateSelect();
    }

    function tick() {
      document.querySelectorAll("[data-time]").forEach(el => {
        el.textContent = formatTime(el.dataset.time);
      });
      document.querySelectorAll("[data-date]").forEach(el => {
        el.textContent = formatDate(el.dataset.date);
      });
    }

    /* ── 날씨 ── */
    const weatherCache = {};

    function weatherEmoji(code) {
      if (code === 0)  return "☀️";
      if (code === 1)  return "🌤️";
      if (code === 2)  return "⛅";
      if (code === 3)  return "☁️";
      if (code <= 48)  return "🌫️";
      if (code <= 55)  return "🌦️";
      if (code <= 67)  return "🌧️";
      if (code <= 77)  return "❄️";
      if (code <= 82)  return "🌧️";
      if (code <= 86)  return "🌨️";
      return "⛈️";
    }

    function weatherDesc(code) {
      if (code === 0)  return "맑음";
      if (code === 1)  return "대체로 맑음";
      if (code === 2)  return "구름 조금";
      if (code === 3)  return "흐림";
      if (code <= 48)  return "안개";
      if (code <= 55)  return "이슬비";
      if (code <= 67)  return "비";
      if (code <= 77)  return "눈";
      if (code <= 82)  return "소나기";
      if (code <= 86)  return "눈 소나기";
      return "뇌우";
    }

    async function fetchWeather(city) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weather_code`;
      const res = await fetch(url);
      const data = await res.json();
      const temp = Math.round(data.current.temperature_2m);
      const code = data.current.weather_code;
      return { temp, emoji: weatherEmoji(code), desc: weatherDesc(code), fetchedAt: Date.now() };
    }

    function applyWeather() {
      document.querySelectorAll("[data-weather]").forEach(el => {
        const w = weatherCache[el.dataset.weather];
        if (w) el.innerHTML =
          `<span class="weather-emoji">${w.emoji}</span><span class="weather-temp">${w.temp}°C</span><span class="weather-desc">${w.desc}</span>`;
      });
    }

    async function fetchAllWeather() {
      const promises = active.map(async name => {
        const city = getCity(name);
        if (!city) return;
        const cached = weatherCache[name];
        if (cached && Date.now() - cached.fetchedAt < 30 * 60 * 1000) return;
        try {
          weatherCache[name] = await fetchWeather(city);
          applyWeather();
        } catch(e) {
          document.querySelectorAll(`[data-weather="${name}"]`).forEach(el => {
            el.textContent = "날씨 정보 없음";
          });
        }
      });
      await Promise.all(promises);
    }

    function addCity() {
      const sel = document.getElementById("citySelect");
      const name = sel.value;
      if (!name || active.includes(name)) return;
      if (active.length >= 6) {
        showPopup("🚫", "최대 6개 도시까지\n표시할 수 있어요!\n먼저 다른 도시를 삭제해 보세요 😊");
        return;
      }
      active.push(name);
      saveActive();
      render();
      fetchAllWeather();
    }

    function removeCity(name) {
      active = active.filter(n => n !== name);
      saveActive();
      render();
    }

    function updateSelect() {
      const sel = document.getElementById("citySelect");
      const prev = sel.value;
      sel.innerHTML = "";
      CITIES.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name;
        const added = active.includes(c.name);
        opt.textContent = added ? `✓ ${c.name} (추가됨)` : `${c.icon} ${c.name}`;
        opt.disabled = added;
        opt.style.color = added ? "#aaa" : "";
        sel.appendChild(opt);
      });
      // 이미 선택됐던 값이 아직 유효하면 유지, 아니면 첫 번째 미선택 도시로
      const stillValid = prev && !active.includes(prev) && CITIES.find(c => c.name === prev);
      sel.value = stillValid
        ? prev
        : CITIES.find(c => !active.includes(c.name))?.name || "";
    }

    function showPopup(emoji, msg) {
      document.getElementById('popupEmoji').textContent = emoji;
      document.getElementById('popupMsg').textContent = msg;
      document.getElementById('popup').classList.add('show');
    }

    function closePopup() {
      document.getElementById('popup').classList.remove('show');
    }

    render();
    fetchAllWeather();
    setInterval(tick, 1000);
    setInterval(fetchAllWeather, 30 * 60 * 1000);
  </script>
</body>
</html>
