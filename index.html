<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<title>클랙스 AI보드 수업도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-main: #2563EB;
    --blue-light: #60A5FA;
    --blue-pale: #DBEAFE;
    --blue-sky: #EFF6FF;
    --white: #FFFFFF;
    --gray-text: #64748B;
    --dark: #1E293B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #EFF6FF 0%, #DBEAFE 50%, #BFDBFE 100%);
    width: 1080px;
    min-height: 1920px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -150px; right: -150px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* 헤더 */
  .header {
    padding: 60px 70px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    animation: fadeDown 0.5s ease both;
  }

  .logo-icon {
    width: 72px; height: 72px;
    background: var(--blue-main);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(37,99,235,0.3);
    flex-shrink: 0;
  }

  .logo-icon svg { width: 42px; height: 42px; }

  .logo-text .logo-name {
    font-size: 40px; font-weight: 900;
    color: var(--blue-main); letter-spacing: -1px; line-height: 1;
  }

  .logo-text .logo-sub {
    font-size: 22px; font-weight: 500;
    color: var(--gray-text); margin-top: 2px;
  }

  .divider {
    width: 2px; height: 52px;
    background: var(--blue-pale);
    border-radius: 2px;
    margin: 0 20px;
  }

  .header-title {
    font-size: 30px; font-weight: 700;
    color: var(--dark);
  }

  /* 섹션 */
  .section {
    padding: 0 48px;
  }

  .section-title {
    font-size: 26px; font-weight: 800;
    color: var(--dark);
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 14px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 8px; height: 32px;
    background: var(--blue-main);
    border-radius: 4px;
  }

  /* 앱 그리드 — 3열 */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    margin-bottom: 60px;
  }

  .app-card {
    background: var(--white);
    border-radius: 28px;
    padding: 36px 20px;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 12px rgba(37,99,235,0.08);
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .app-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--card-accent, var(--blue-main));
    border-radius: 28px 28px 0 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .app-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 40px rgba(37,99,235,0.16);
    border-color: var(--blue-light);
  }

  .app-card:hover::before { opacity: 1; }
  .app-card:active { transform: scale(0.97); }

  .app-card:nth-child(1) { animation-delay: 0.05s; }
  .app-card:nth-child(2) { animation-delay: 0.10s; }
  .app-card:nth-child(3) { animation-delay: 0.15s; }
  .app-card:nth-child(4) { animation-delay: 0.20s; }
  .app-card:nth-child(5) { animation-delay: 0.25s; }
  .app-card:nth-child(6) { animation-delay: 0.30s; }
  .app-card:nth-child(7) { animation-delay: 0.35s; }
  .app-card:nth-child(8) { animation-delay: 0.40s; }
  .app-card:nth-child(9) { animation-delay: 0.45s; }

  .app-icon-wrap {
    width: 96px; height: 96px;
    border-radius: 24px;
    background: var(--card-bg, var(--blue-sky));
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .app-card:hover .app-icon-wrap {
    transform: scale(1.12) rotate(-4deg);
  }

  .app-name {
    font-size: 24px; font-weight: 800;
    color: var(--dark); text-align: center;
    letter-spacing: -0.5px;
    word-break: keep-all;
  }

  .app-desc {
    font-size: 17px; color: var(--gray-text);
    text-align: center; font-weight: 400;
    line-height: 1.5;
    word-break: keep-all;
  }

  .app-badge {
    background: var(--card-accent, var(--blue-main));
    color: white;
    font-size: 15px; font-weight: 700;
    padding: 6px 16px;
    border-radius: 100px;
  }

  .app-card.coming-soon {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }

  /* 푸터 */
  .footer {
    padding: 40px 70px 60px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 2px solid var(--blue-pale);
  }

  .footer-logo {
    font-size: 22px; font-weight: 900;
    color: var(--blue-main);
  }

  .footer-info {
    font-size: 18px; color: var(--gray-text);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-icon">

      <path d="M21 4 L29 12 L38 14 L31 23 L33 32 L21 27 L9 32 L11 23 L4 14 L13 12 Z" fill="white" opacity="0.9"/>
      <circle cx="21" cy="20" r="7" fill="white"/>
    </svg>
  </div>
  <div class="logo-text">
    <div class="logo-name">claix</div>
    <div class="logo-sub">AI 보드</div>
  </div>
  <div class="divider"></div>
  <div class="header-title">수업도우미</div>
</div>

<div class="section">

  <div class="app-grid">

    <a class="app-card coming-soon" style="--card-accent:#7C3AED; --card-bg:#F5F3FF;">

      <div class="app-badge" style="background:#94A3B8;">준비 중</div>
    </a>

    <a class="app-card coming-soon" style="--card-accent:#DC2626; --card-bg:#FEF2F2;">
      <div class="app-icon-wrap">🍅</div>
      <div class="app-name">뽀모도로</div>

    <a class="app-card coming-soon" style="--card-accent:#059669; --card-bg:#ECFDF5;">

    <a class="app-card coming-soon" style="--card-accent:#0891B2; --card-bg:#ECFEFF;">

    </a>

    <a class="app-card coming-soon" style="--card-accent:#7C3AED; --card-bg:#F5F3FF;">
      <div class="app-icon-wrap">🎲</div>
      <div class="app-name">발표자선정</div>

      <div class="app-badge" style="background:#94A3B8;">준비 중</div>
    </a>

    <a class="app-card coming-soon" style="--card-accent:#BE185D; --card-bg:#FDF2F8;">
      <div class="app-icon-wrap">🎵</div>
      <div class="app-name">악기</div>
      <div class="app-desc">가상 악기<br>연주</div>

    </a>

    <a class="app-card coming-soon" style="--card-accent:#EA580C; --card-bg:#FFF7ED;">
      <div class="app-icon-wrap">🪜</div>

      <div class="app-desc">모둠 배정<br>역할 분배</div>

  </div>
</div>

<div class="footer">
  <div class="footer-logo">✦ claix AI Board</div>
  <div class="footer-info">수업도우미 v1.0</div>
</div>

</body>
</html>
